<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ВЕРСТАК">
<meta name="theme-color" content="#15130f">
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" href="icon.png">
<link rel="manifest" href="manifest.webmanifest">
<title>Верстак — управление производством</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap');

  :root{
    --bg:#15130f;
    --panel:#1f1b15;
    --panel-2:#272219;
    --line:#3a3225;
    --wood:#c08a4a;
    --wood-2:#e0a85c;
    --text:#ede4d3;
    --muted:#9a8f78;
    --green:#7fa650;
    --red:#c4583f;
    --amber:#d9a13b;
    --blue:#5e8aa8;
  }
  body[data-theme="light"]{
    --bg:#f4efe7;--panel:#ffffff;--panel-2:#efe8dc;--line:#e0d6c5;--text:#2c2722;--muted:#8a8172;
    --green:#5f8a3a;--red:#c4583f;--amber:#c98a1e;--blue:#3f6f8f;
    background-image:none!important;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:'Inter',sans-serif;
    background:var(--bg);
    color:var(--text);
    overflow:hidden;
    background-image:
      radial-gradient(circle at 20% 10%, rgba(192,138,74,0.06), transparent 40%),
      radial-gradient(circle at 80% 90%, rgba(94,138,168,0.05), transparent 40%);
  }
  .app{display:flex;flex-direction:column;height:100vh;height:100dvh;max-width:560px;margin:0 auto;position:relative;}

  /* Header */
  header{
    padding:calc(14px + env(safe-area-inset-top)) 18px 14px;
    border-bottom:1px solid var(--line);
    background:linear-gradient(180deg,var(--panel),transparent);
  }
  header h1{
    font-family:'Oswald',sans-serif;
    font-weight:700;
    font-size:26px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    display:flex;align-items:center;gap:10px;
  }
  header h1 .mark{color:var(--wood-2);}
  header .sub{color:var(--muted);font-size:12px;margin-top:2px;letter-spacing:0.3px;}
  .hdr-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
  .proj-search{width:100%;margin-bottom:12px;background:var(--panel);border:1px solid var(--line);color:var(--text);border-radius:12px;padding:11px 14px;font-family:'Inter';font-size:14px;}
  .proj-search:focus{border-color:var(--wood);outline:none;}
  .backup{display:flex;gap:6px;flex-shrink:0;margin-top:3px;flex-wrap:wrap;justify-content:flex-end;max-width:62%;}
  .backup button{background:var(--panel-2);border:1px solid var(--line);border-radius:9px;color:var(--muted);padding:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .backup button svg{width:17px;height:17px;stroke:var(--wood-2);fill:none;stroke-width:1.8;}
  .backup button:active{background:var(--line);}

  /* Content */
  .content{flex:1;overflow-y:auto;padding:14px 14px 78px;-webkit-overflow-scrolling:touch;}
  .content::-webkit-scrollbar{width:0;}

  /* Tab bar */
  nav{
    position:absolute;bottom:calc(4px + env(safe-area-inset-bottom) * 0.35);
    left:50%;transform:translateX(-50%);
    display:flex;gap:2px;background:var(--panel);
    border:1px solid var(--line);border-radius:20px;
    padding:5px 7px;box-shadow:0 6px 18px rgba(0,0,0,.45);
  }
  nav button{
    flex:0 0 auto;width:55px;background:none;border:none;color:var(--muted);
    font-family:'Inter';font-size:9.5px;font-weight:500;
    display:flex;flex-direction:column;align-items:center;gap:3px;
    padding:6px 2px;cursor:pointer;border-radius:13px;transition:.15s;
  }
  nav button svg{width:21px;height:21px;stroke:var(--muted);fill:none;stroke-width:1.8;transition:.15s;}
  nav button.active{color:var(--wood-2);background:var(--panel-2);}
  nav button.active svg{stroke:var(--wood-2);}

  /* Cards */
  .card{
    background:var(--panel);border:1px solid var(--line);
    border-radius:14px;padding:15px;margin-bottom:12px;
    position:relative;overflow:hidden;
  }
  .card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--wood);}

  .proj-card{cursor:pointer;transition:.15s;}
  .proj-card:active{transform:scale(0.99);}
  .proj-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
  .proj-name{font-family:'Oswald';font-size:19px;font-weight:600;letter-spacing:0.4px;}
  .proj-desc{color:var(--muted);font-size:13px;margin-top:3px;line-height:1.4;}
  .proj-meta{display:flex;gap:14px;margin-top:12px;flex-wrap:wrap;}
  .meta-pill{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px;}
  .meta-pill b{color:var(--text);font-weight:600;}

  .badge{font-size:10.5px;font-weight:600;padding:4px 9px;border-radius:20px;text-transform:uppercase;letter-spacing:0.5px;white-space:nowrap;}
  .b-active{background:rgba(127,166,80,0.18);color:var(--green);}
  .b-hold{background:rgba(217,161,59,0.18);color:var(--amber);}
  .b-done{background:rgba(94,138,168,0.18);color:var(--blue);}

  /* progress */
  .pbar{height:6px;background:var(--panel-2);border-radius:6px;overflow:hidden;margin-top:12px;}
  .pbar i{display:block;height:100%;background:linear-gradient(90deg,var(--wood),var(--wood-2));border-radius:6px;transition:.4s;}
  .pbar-label{font-size:11px;color:var(--muted);margin-top:5px;display:flex;justify-content:space-between;}

  /* section title */
  .sec-title{font-family:'Oswald';font-size:14px;text-transform:uppercase;letter-spacing:1.2px;color:var(--wood-2);margin:18px 4px 10px;display:flex;align-items:center;gap:8px;}
  .sec-title:first-child{margin-top:4px;}

  /* buttons */
  .btn{
    background:linear-gradient(180deg,var(--wood-2),var(--wood));
    color:#1a140b;border:none;font-family:'Oswald';font-weight:600;
    font-size:14px;letter-spacing:0.8px;text-transform:uppercase;
    padding:13px;border-radius:12px;width:100%;cursor:pointer;
  }
  .btn:active{filter:brightness(0.92);}
  .btn-ghost{background:var(--panel-2);color:var(--text);border:1px solid var(--line);}
  .btn-sm{padding:9px 14px;font-size:12px;width:auto;border-radius:10px;}

  .fab{
    position:absolute;bottom:calc(72px + env(safe-area-inset-bottom) * 0.35);right:16px;width:56px;height:56px;border-radius:50%;
    background:linear-gradient(180deg,var(--wood-2),var(--wood));border:none;
    color:#1a140b;font-size:30px;line-height:1;cursor:pointer;box-shadow:0 6px 18px rgba(0,0,0,.5);
    display:flex;align-items:center;justify-content:center;z-index:5;
  }
  .fab:active{transform:scale(0.93);}

  /* empty */
  .empty{text-align:center;padding:50px 20px;color:var(--muted);}
  .empty svg{width:54px;height:54px;stroke:var(--line);fill:none;stroke-width:1.5;margin-bottom:14px;}
  .empty p{font-size:14px;line-height:1.5;}

  /* checklist items */
  .item{display:flex;align-items:flex-start;gap:11px;padding:11px 0;border-bottom:1px solid var(--line);}
  .item:last-child{border-bottom:none;}
  .cbx{width:22px;height:22px;border-radius:6px;border:2px solid var(--line);flex-shrink:0;margin-top:1px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;}
  .cbx.on{background:var(--green);border-color:var(--green);}
  .cbx.on svg{width:13px;height:13px;stroke:#15130f;stroke-width:3;fill:none;}
  .item-body{flex:1;min-width:0;}
  .item-txt{font-size:14.5px;line-height:1.35;word-break:break-word;}
  .item-txt.done{text-decoration:line-through;color:var(--muted);}
  .item-sub{font-size:11.5px;color:var(--muted);margin-top:3px;}
  .item-note{font-size:12px;color:var(--text);margin-top:4px;white-space:pre-wrap;word-break:break-word;border-left:2px solid var(--wood);padding-left:7px;opacity:.9;}
  .del{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:0 4px;flex-shrink:0;}

  /* stage / timeline */
  .stage{display:flex;gap:13px;padding:4px 0;}
  .stage-rail{display:flex;flex-direction:column;align-items:center;flex-shrink:0;}
  .stage-dot{width:16px;height:16px;border-radius:50%;border:3px solid var(--line);background:var(--panel);margin-top:2px;cursor:pointer;}
  .stage-dot.on{background:var(--green);border-color:var(--green);}
  .stage-line{flex:1;width:2px;background:var(--line);margin:3px 0;min-height:10px;}
  .stage:last-child .stage-line{display:none;}
  .stage-body{flex:1;padding-bottom:14px;min-width:0;}
  .stage-name{font-size:15px;font-weight:600;}
  .stage-name.done{color:var(--muted);text-decoration:line-through;}
  .stage-date{font-size:11.5px;color:var(--wood-2);margin-top:5px;display:flex;align-items:center;gap:6px;}
  .stage-date.over{color:var(--red);}
  .stage-date-input{background:var(--panel-2);border:1px solid var(--line);border-radius:8px;color:inherit;font-family:'Inter';font-size:12px;padding:5px 8px;width:auto;min-width:130px;}
  .stage-date .over-tag{color:var(--red);font-weight:600;}

  /* reminders */
  .rem{display:flex;align-items:center;gap:12px;}
  .rem-when{text-align:center;flex-shrink:0;width:52px;}
  .rem-when .d{font-family:'Oswald';font-size:22px;font-weight:700;line-height:1;}
  .rem-when .m{font-size:10px;text-transform:uppercase;color:var(--muted);letter-spacing:1px;}
  .rem-when.soon .d{color:var(--red);}

  /* calendar grid */
  .cal-nav{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;}
  .cal-nav button{background:var(--panel-2);border:1px solid var(--line);border-radius:10px;color:var(--wood-2);font-size:22px;line-height:1;width:44px;height:38px;cursor:pointer;}
  .cal-nav button:active{background:var(--line);}
  .cal-title{font-family:'Oswald';font-size:17px;text-transform:capitalize;letter-spacing:.5px;flex:1;text-align:center;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
  .cal-wd{text-align:center;font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding-bottom:2px;}
  .cal-cell{aspect-ratio:1;background:var(--panel);border:1px solid var(--line);border-radius:10px;display:flex;flex-direction:column;align-items:center;padding:5px 2px 3px;cursor:pointer;position:relative;min-height:40px;}
  .cal-cell.out{opacity:.3;}
  .cal-cell.today{border-color:var(--wood-2);}
  .cal-cell.sel{background:var(--panel-2);box-shadow:0 0 0 2px var(--wood);}
  .cal-cell.dead{background:rgba(196,88,63,0.20);border-color:var(--red);}
  .cal-num{font-family:'Oswald';font-size:14px;font-weight:600;}
  .cal-cell.today .cal-num{color:var(--wood-2);}
  .cal-dots{display:flex;gap:3px;margin-top:auto;flex-wrap:wrap;justify-content:center;}
  .cal-dots .dot{width:5px;height:5px;border-radius:50%;}
  .dot.rem{background:var(--blue);}
  .dot.dead{background:var(--red);}
  .dot.stage{background:var(--wood-2);}
  .cal-legend{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin:10px 0 2px;font-size:11px;color:var(--muted);}
  .cal-legend span{display:flex;align-items:center;gap:5px;}
  .cal-legend .dot{width:8px;height:8px;border-radius:50%;display:inline-block;}

  /* modal */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(3px);z-index:50;display:none;align-items:flex-end;}
  .overlay.show{display:flex;}
  .sheet{background:var(--panel);width:100%;max-width:560px;margin:0 auto;border-radius:20px 20px 0 0;border-top:1px solid var(--line);padding:20px 18px calc(24px + env(safe-area-inset-bottom));max-height:88vh;overflow-y:auto;animation:up .25s ease;}
  @keyframes up{from{transform:translateY(100%);}to{transform:translateY(0);}}
  .sheet h2{font-family:'Oswald';font-size:21px;letter-spacing:0.6px;margin-bottom:16px;}
  label.f{display:block;font-size:12px;color:var(--muted);margin:12px 0 5px;letter-spacing:0.3px;}
  input,textarea,select{
    width:100%;background:var(--panel-2);border:1px solid var(--line);border-radius:10px;
    padding:12px;color:var(--text);font-family:'Inter';font-size:15px;outline:none;
  }
  input:focus,textarea:focus,select:focus{border-color:var(--wood);}
  textarea{resize:none;min-height:64px;}
  .row{display:flex;gap:10px;}
  .row>*{flex:1;}
  .sheet-actions{display:flex;gap:10px;margin-top:20px;}

  /* detail header */
  .back{background:none;border:none;color:var(--wood-2);font-size:14px;display:flex;align-items:center;gap:5px;cursor:pointer;margin-bottom:14px;padding:4px 0;}
  .back svg{width:18px;height:18px;stroke:var(--wood-2);fill:none;stroke-width:2;}
  .tabs{display:flex;gap:6px;background:var(--panel-2);padding:4px;border-radius:12px;margin-bottom:14px;}
  .tabs button{flex:1;background:none;border:none;color:var(--muted);font-size:12.5px;font-weight:600;padding:9px 4px;border-radius:9px;cursor:pointer;font-family:'Inter';}
  .tabs button.on{background:var(--wood);color:#1a140b;}
  /* режим «только просмотр» для завершённых проектов */
  .ro-banner{display:flex;align-items:center;gap:8px;background:rgba(94,138,168,0.15);border:1px solid var(--blue);color:var(--blue);border-radius:12px;padding:10px 13px;font-size:13px;font-weight:600;margin-bottom:12px;}
  .ro-lock{pointer-events:none;opacity:.96;}
  .ro-lock input,.ro-lock textarea,.ro-lock select{background:var(--panel-2);}
  .ro-lock .act-btn{pointer-events:auto;opacity:1;}

  .add-inline{display:flex;gap:8px;margin-top:12px;}
  .add-inline input{flex:1;}
  .add-inline button{background:var(--wood);border:none;color:#1a140b;width:46px;border-radius:10px;font-size:24px;cursor:pointer;flex-shrink:0;}

  .hint{font-size:11px;color:var(--muted);text-align:center;margin-top:16px;opacity:.7;}
  .chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:12px;}
  .chip{background:var(--panel-2);border:1px solid var(--line);border-radius:18px;color:var(--text);font-size:12.5px;padding:7px 12px;cursor:pointer;font-family:'Inter';}
  .chip:active{background:var(--line);}
  .chip.on{background:var(--wood);color:#1a140b;border-color:var(--wood);font-weight:600;}

  /* отчёт для клиента (PDF) */
  #report{position:fixed;left:-9999px;top:0;width:794px;background:#fff;color:#1a1a1a;padding:36px;font-family:'Inter',Arial,sans-serif;}
  #report .rep-h1{font-family:'Oswald',Arial;font-size:26px;font-weight:700;letter-spacing:1px;color:#a8702f;}
  #report .rep-sub{color:#666;font-size:13px;margin-top:2px;}
  #report .rep-sec{font-size:15px;font-weight:700;margin:24px 0 8px;border-bottom:2px solid #c08a4a;padding-bottom:5px;color:#7a4f1d;text-transform:uppercase;letter-spacing:.5px;}
  #report .rep-row{display:flex;justify-content:space-between;gap:14px;padding:8px 0;border-bottom:1px solid #eee;font-size:14px;}
  #report .rep-row b{font-weight:700;text-align:right;}
  #report .rep-total{display:flex;justify-content:space-between;font-size:18px;font-weight:800;margin-top:12px;padding-top:12px;border-top:2px solid #333;}
  #report .rep-exp{margin:12px 0;page-break-inside:avoid;}
  #report .rep-exp-top{display:flex;justify-content:space-between;gap:14px;font-size:14px;font-weight:600;}
  #report .rep-photo{max-width:100%;max-height:300px;margin-top:8px;border:1px solid #ddd;border-radius:6px;display:block;}
  #report .rep-foot{margin-top:34px;color:#999;font-size:12px;text-align:center;border-top:1px solid #eee;padding-top:12px;}
  @media print{
    .app,.overlay,.photo-view,.fab{display:none!important;}
    html,body{background:#fff!important;}
    #report{position:static;left:0;width:auto;padding:0;}
  }

  /* finance */
  .fin-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:6px;}
  .fin-box{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px;position:relative;overflow:hidden;}
  .fin-box::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--wood);}
  .fin-box.wide{grid-column:1/-1;}
  .fin-lbl{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
  .fin-val{font-family:'Oswald';font-size:21px;font-weight:600;margin-top:4px;}
  .fin-val.green{color:var(--green);}.fin-val.red{color:var(--red);}.fin-val.amber{color:var(--amber);}.fin-val.blue{color:var(--blue);}
  .fin-sub{font-size:10.5px;color:var(--muted);margin-top:3px;}
  .money-row{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--line);}
  .money-row:last-child{border:none;}
  .m-amt{font-family:'Oswald';font-weight:600;font-size:15px;white-space:nowrap;}
  .m-amt.green{color:var(--green);}.m-amt.red{color:var(--red);}
  .thumb{width:40px;height:40px;border-radius:8px;object-fit:cover;border:1px solid var(--line);cursor:pointer;flex-shrink:0;}
  .photo-view{position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
  .photo-view img{max-width:100%;max-height:84%;border-radius:10px;}
  .pv-hint{color:var(--muted);font-size:12px;margin-top:14px;}
  /* редактор замеров */
  .me-overlay{position:fixed;inset:0;background:#0d0a06;z-index:250;display:flex;flex-direction:column;}
  .me-bar{display:flex;align-items:center;gap:8px;padding:calc(12px + env(safe-area-inset-top)) 14px 12px;background:var(--panel);border-bottom:1px solid var(--line);}
  .me-bar.bottom{padding:12px 14px calc(12px + env(safe-area-inset-bottom));border-top:1px solid var(--line);border-bottom:none;flex-wrap:wrap;justify-content:center;}
  .me-bar .ttl{flex:1;font-weight:700;font-size:15px;}
  .me-canvas-wrap{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:8px;touch-action:none;}
  .me-canvas-wrap canvas{touch-action:none;border-radius:8px;box-shadow:0 4px 18px rgba(0,0,0,.5);}
  .me-btn{background:var(--panel-2);border:1px solid var(--line);color:var(--text);font-family:'Inter';font-weight:600;font-size:13px;padding:9px 13px;border-radius:10px;cursor:pointer;}
  .me-btn.primary{background:var(--wood);color:#1a140b;border-color:var(--wood);}
  .me-btn.active{background:var(--green);color:#06210f;border-color:var(--green);}
  .me-btn.danger{background:#3a1e1e;border-color:#5a2a2a;color:#ffb4b4;}
  .me-btn:disabled{opacity:.4;}
  .me-hint{width:100%;text-align:center;color:var(--muted);font-size:12px;margin:2px 0 0;}
  .measure-card{position:relative;}
  .measure-card .mbadge{position:absolute;left:8px;bottom:8px;background:rgba(0,0,0,.6);color:#fff;font-size:11px;font-weight:700;padding:3px 8px;border-radius:20px;}
  .me-note-pop{position:fixed;left:50%;top:42%;transform:translate(-50%,-50%);z-index:260;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px;width:min(92vw,420px);box-shadow:0 12px 44px rgba(0,0,0,.6);}
  .me-note-pop textarea{width:100%;min-height:90px;}
  .me-note-pop .row{display:flex;gap:8px;margin-top:10px;}

  /* адаптив: телефон → планшет → компьютер */
  .proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px;}
  .proj-grid .card{margin-bottom:0;}
  @media(min-width:760px){
    .app{max-width:860px;}
    .sheet{border-radius:20px;margin-bottom:24px;max-width:520px;}
    .overlay{align-items:center;}
  }
  @media(min-width:1200px){
    .app{max-width:1040px;}
  }
</style>
<style>
  #loginOverlay{position:fixed;inset:0;z-index:9999;background:var(--bg);display:none;align-items:center;justify-content:center;padding:24px;}
  .login-box{width:100%;max-width:340px;background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:28px 22px;display:flex;flex-direction:column;gap:14px;}
  .login-logo{font-family:'Oswald',sans-serif;font-size:26px;font-weight:700;color:var(--wood-2);text-align:center;letter-spacing:1px;}
  .login-sub{text-align:center;color:var(--muted);font-size:14px;margin-top:-8px;margin-bottom:6px;}

<script>
/* ---------- storage (IndexedDB — много памяти под фото) ---------- */
const KEY='verstak_v1';
const IDB_NAME='verstak_store', IDB_STORE='kv';
let DB={projects:[],objects:[],tasks:[],shop:[],reminders:[],settings:{}};
let idb=null;
function normalizeDB(d){return {projects:d.projects||[],objects:d.objects||[],tasks:d.tasks||[],shop:d.shop||[],reminders:d.reminders||[],settings:d.settings||{}};}
function openIDB(){
  return new Promise((res,rej)=>{
    try{
      const req=indexedDB.open(IDB_NAME,1);
      req.onupgradeneeded=()=>{const db=req.result;if(!db.objectStoreNames.contains(IDB_STORE))db.createObjectStore(IDB_STORE);};
      req.onsuccess=()=>res(req.result);
      req.onerror=()=>rej(req.error);
    }catch(e){rej(e);}
  });
}
function idbGet(key){return new Promise((res,rej)=>{const r=idb.transaction(IDB_STORE,'readonly').objectStore(IDB_STORE).get(key);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});}
function idbSet(key,val){return new Promise((res,rej)=>{const tx=idb.transaction(IDB_STORE,'readwrite');tx.objectStore(IDB_STORE).put(val,key);tx.oncomplete=()=>res();tx.onerror=()=>rej(tx.error);});}
async function init(){
  try{
    idb=await openIDB();
    let data=await idbGet(KEY);
    if(!data){ // одноразовый перенос старых данных из localStorage
      try{const r=localStorage.getItem(KEY);if(r){data=JSON.parse(r);await idbSet(KEY,data);}}catch(e){}
    }
    if(data)DB=normalizeDB(data);
  }catch(e){
    try{const r=localStorage.getItem(KEY);if(r)DB=normalizeDB(JSON.parse(r));}catch(e2){}
  }
  applySettings();
  render();
  if('serviceWorker' in navigator && location.protocol.startsWith('http')){
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  }
  setNotifBadge();
}
function saveLocalOnly(){
  if(idb){
    idbSet(KEY,DB).catch(()=>{alert('Не удалось сохранить — не хватает памяти. Сделайте резервную копию (стрелка вверх в шапке) и удалите часть фото.');});
    return true;
  }
  try{localStorage.setItem(KEY,JSON.stringify(DB));return true;}
  catch(e){alert('Не удалось сохранить — переполнена память телефона. Сделайте резервную копию и удалите часть фото.');return false;}
}
function save(){const ok=saveLocalOnly();scheduleCloudPush();return ok;}

/* ---------- облачная синхронизация (Firebase Realtime DB) ---------- */
let cloudRef=null, cloudUid=null, lastAppliedUpd=0, firstSnapshot=true, pushTimer=null, syncReady=false;
const myDevice=(()=>{let d;try{d=localStorage.getItem('verstak_device');}catch(e){}if(!d){d=Date.now().toString(36)+Math.random().toString(36).slice(2,8);try{localStorage.setItem('verstak_device',d);}catch(e){}}return d;})();

function setSyncBadge(state){
  const b=document.getElementById('syncBadge');if(!b)return;
  const col={on:'var(--green)',saving:'var(--amber)',off:'var(--muted)',noauth:'var(--muted)'}[state]||'var(--muted)';
  const svg=b.querySelector('svg');if(svg)svg.style.stroke=col;
  b.style.color=col;
  b.title={on:'Синхронизировано',saving:'Сохранение…',off:'Без синхронизации',noauth:'Войдите для синхронизации'}[state]||'Синхронизация';
}
function dbItemCount(d){d=d||{};return (d.projects||[]).length;}
function dbIsEmpty(d){d=d||{};return !(d.projects&&d.projects.length)&&!(d.objects&&d.objects.length)&&!(d.tasks&&d.tasks.length)&&!(d.shop&&d.shop.length)&&!(d.reminders&&d.reminders.length);}

function initSync(){
  if(typeof firebase==='undefined'||!window.firebaseConfig){setSyncBadge('off');return;}
  try{
    firebase.initializeApp(window.firebaseConfig);
    const auth=firebase.auth();
    auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL).catch(()=>{});
    auth.onAuthStateChanged(u=>{
      if(u){hideLogin();startCloudSync(u.uid);}
      else{setSyncBadge('noauth');showLogin();}
    });
  }catch(e){console.log('sync init error',e);setSyncBadge('off');}
}
function showLogin(){const o=document.getElementById('loginOverlay');if(o)o.style.display='flex';}
function hideLogin(){const o=document.getElementById('loginOverlay');if(o)o.style.display='none';}
function doLogin(){
  const em=(document.getElementById('loginEmail').value||'').trim();
  const pw=document.getElementById('loginPass').value||'';
  const err=document.getElementById('loginErr');
  if(!em||!pw){err.textContent='Введите email и пароль';return;}
  err.textContent='Вход…';
  firebase.auth().signInWithEmailAndPassword(em,pw)
    .then(()=>{err.textContent='';document.getElementById('loginPass').value='';})
    .catch(e=>{const m=e.code||'';
      err.textContent=(m.indexOf('password')>-1||m.indexOf('credential')>-1||m.indexOf('user-not-found')>-1)?'Неверный email или пароль'
        :m.indexOf('network')>-1?'Нет интернета':'Ошибка входа: '+(e.message||m);});
}
function skipLogin(){hideLogin();setSyncBadge('off');}
function startCloudSync(uid){
  cloudUid=uid;syncReady=true;setSyncBadge('on');
  refreshPushSub();
  cloudRef=firebase.database().ref('verstak/'+uid);
  firebase.database().ref('.info/connected').on('value',s=>{if(syncReady)setSyncBadge(s.val()?'on':'saving');});
  cloudRef.on('value',snap=>{
    const v=snap.val();
    if(firstSnapshot){
      firstSnapshot=false;
      if(!v){if(!dbIsEmpty(DB))pushNow();return;}
      if(dbIsEmpty(DB)){applyRemote(v);return;}
      const lc=dbItemCount(DB),rc=dbItemCount(v.data);
      const useCloud=confirm('Синхронизация подключена.\n\nНа этом устройстве: '+lc+' проект(ов).\nВ облаке: '+rc+' проект(ов).\n\nОК — загрузить ИЗ ОБЛАКА (заменит данные на этом устройстве).\nОтмена — отправить данные ЭТОГО устройства в облако.');
      if(useCloud)applyRemote(v);else pushNow();
      return;
    }
    if(!v)return;
    if(v._device===myDevice){lastAppliedUpd=Math.max(lastAppliedUpd,v._updated||0);return;}
    if((v._updated||0)>lastAppliedUpd)applyRemote(v);
  });
}
function applyRemote(v){
  DB=normalizeDB(v.data||{});
  lastAppliedUpd=v._updated||Date.now();
  saveLocalOnly();
  if(openProject){openProject=DB.projects.find(p=>p.id===openProject.id)||null;}
  applySettings();
  render();
  setSyncBadge('on');
}
function scheduleCloudPush(){
  if(!cloudRef||!syncReady)return;
  setSyncBadge('saving');
  clearTimeout(pushTimer);
  pushTimer=setTimeout(pushNow,1000);
}
function pushNow(){
  if(!cloudRef)return;
  clearTimeout(pushTimer);
  const upd=Date.now();lastAppliedUpd=upd;setSyncBadge('saving');
  cloudRef.set({data:DB,_updated:upd,_device:myDevice})
    .then(()=>setSyncBadge('on'))
    .catch(e=>{console.log('push error',e);setSyncBadge('saving');});
}
function syncMenu(){
  if(!cloudUid){showLogin();return;}
  if(confirm('Синхронизация включена ✓\n\nДанные автоматически обновляются на всех устройствах.\n\nОК — выйти из аккаунта на этом устройстве (данные останутся локально).')){
    firebase.auth().signOut().then(()=>{cloudRef=null;cloudUid=null;syncReady=false;firstSnapshot=true;setSyncBadge('noauth');showLogin();});
  }
}
/* ---------- push-уведомления о сроках (Web Push) ---------- */
const VAPID_PUBLIC='BBSAWFNOSqNJr-sjzVH6b5MqGJxOcUS8hT7tHmS5rFWiiR2RA2hWhUAX9Z7aRokO3EVSWqcw63vivsRseLfcQkY';
function urlB64ToUint8(s){const pad='='.repeat((4-s.length%4)%4);const b=(s+pad).replace(/-/g,'+').replace(/_/g,'/');const raw=atob(b);const arr=new Uint8Array(raw.length);for(let i=0;i<raw.length;i++)arr[i]=raw.charCodeAt(i);return arr;}
function pushSupported(){return ('serviceWorker' in navigator)&&('PushManager' in window)&&('Notification' in window);}
function setNotifBadge(){
  const b=document.getElementById('notifBadge');if(!b)return;
  if(!pushSupported()){b.style.display='none';return;}
  const granted=(Notification.permission==='granted');
  const svg=b.querySelector('svg');if(svg)svg.style.stroke=granted?'var(--green)':'var(--muted)';
  b.style.color=granted?'var(--green)':'var(--muted)';
  b.title=granted?'Уведомления о сроках включены':'Включить уведомления о сроках';
}
async function enableNotifs(){
  if(!pushSupported()){alert('Это устройство или браузер не поддерживает уведомления.');return;}
  if(Notification.permission==='denied'){alert('Уведомления запрещены в настройках телефона.\n\nОткройте Настройки → ВЕРСТАК → Уведомления и разрешите их, затем нажмите колокольчик снова.');return;}
  if(!cloudUid){alert('Сначала войдите в синхронизацию (значок облака слева) — уведомления привяжутся к вашему аккаунту.');showLogin();return;}
  const standalone=window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone;
  const already=(Notification.permission==='granted');
  try{
    let perm=Notification.permission;
    if(perm!=='granted')perm=await Notification.requestPermission();
    if(perm!=='granted'){setNotifBadge();return;}
    const reg=await navigator.serviceWorker.ready;
    let sub=await reg.pushManager.getSubscription();
    if(!sub)sub=await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:urlB64ToUint8(VAPID_PUBLIC)});
    await savePushSub(sub); // дописываем всегда — даже если разрешение уже было
    setNotifBadge();
    alert((already?'Уведомления включены ✓':'Готово! 🔔')+'\n\nКаждое утро в 9:00 придёт одно напоминание о сроках на сегодня и завтра: дедлайны, замеры, монтажи и другие даты.');
  }catch(e){console.log('notif error',e);
    alert('Не получилось включить уведомления.'+(!standalone?'\n\nНа iPhone это работает только если открыть ВЕРСТАК с экрана «Домой» (добавьте через Safari → Поделиться → «На экран Домой»), а не из браузера.':'\n\n'+(e&&e.message||'')));}
}
function savePushSub(sub){
  if(!cloudUid||typeof firebase==='undefined')return Promise.resolve();
  const j=sub.toJSON();
  return firebase.database().ref('pushSubs/'+cloudUid+'/'+myDevice).set({endpoint:j.endpoint,keys:j.keys,device:myDevice,ts:Date.now()});
}
async function refreshPushSub(){ // при старте: если уже разрешено — обновляем адрес телефона в облаке
  if(!pushSupported()||Notification.permission!=='granted'||!cloudUid)return;
  try{const reg=await navigator.serviceWorker.ready;const sub=await reg.pushManager.getSubscription();if(sub)await savePushSub(sub);}catch(e){}
}
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const DEFAULT_STAGES=['Предварительный расчёт','Замер','Согласование','Проектировка','Итоговое согласование','Запуск в производство','Закупки','Выдача с производства','Монтаж'];
const DEFAULT_SUPPLIERS=['Salex','Lamino','Балкан Юг','Элаз','Мастер-Хаус','Интериори','Asco'];
const CALC_URL='https://iiasaiiaa11-byte.github.io/kalkulator.html';

/* ---------- фото: сжатие, выбор, просмотр ---------- */
function pickPhoto(input,cb){
  const f=input.files&&input.files[0]; if(!f)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const max=1200; let w=img.width,h=img.height;
      if(w>h&&w>max){h=Math.round(h*max/w);w=max;}
      else if(h>=w&&h>max){w=Math.round(w*max/h);h=max;}
      const c=document.createElement('canvas');c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      cb(c.toDataURL('image/jpeg',0.7));
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(f);
}
function onSheetPhoto(input){pickPhoto(input,d=>{pendingPhoto=d;renderSheetPhoto();});}
function renderSheetPhoto(){
  const w=$('photoPreview'); if(!w)return;

       </div>`
    : '';
}

/* ---------- helpers ---------- */
const $=id=>document.getElementById(id);
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function fmtDate(d){if(!d)return '';const dt=new Date(d+'T00:00');return dt.toLocaleDateString('ru-RU',{day:'numeric',month:'short'});}
function daysLeft(d){if(!d)return null;const t=new Date();t.setHours(0,0,0,0);const dt=new Date(d+'T00:00');return Math.round((dt-t)/86400000);}
function money(n){n=Number(n)||0;return n.toLocaleString('ru-RU',{maximumFractionDigits:2})+' '+curSym();}
function todayISO(){return new Date().toISOString().slice(0,10);}
function fin(p){
  const income=(+p.prepay||0)+(+p.finalpay||0);
  const mainSpent =(p.mainExpenses||[]).reduce((s,x)=>s+(+x.amount||0),0);
  const extraSpent=(p.expenses||[]).reduce((s,x)=>s+(+x.amount||0),0);
  const extraClient=(p.expenses||[]).filter(x=>x.clientPay).reduce((s,x)=>s+(+x.amount||0),0);
  const spent=mainSpent+extraSpent;
  const price=+p.price||0;
  return {income,spent,mainSpent,extraSpent,extraClient,price,prepay:+p.prepay||0,finalpay:+p.finalpay||0,remain:price-income,profit:price-spent,balance:income-spent};
}

function render(){

}

/* ---------- PROJECTS ---------- */
function dashboardBlock(){
  const aps=activeProjects();
  if(!aps.length)return '';
  let toReceive=0;aps.forEach(p=>{const f=fin(p);if(f.remain>0)toReceive+=f.remain;});
  let buyN=0;aps.forEach(p=>buyN+=(p.shop||[]).filter(s=>!s.done).length);buyN+=(DB.shop||[]).filter(s=>!s.done).length;
  const dls=[];
  aps.forEach(p=>{
    const pn=(p.objectId?objName(p.objectId)+' · ':'')+p.name;
    if(p.deadline)dls.push({date:p.deadline,txt:pn,ic:'🚩'});
    (p.stages||[]).forEach(s=>{if(s.date&&!s.done)dls.push({date:s.date,txt:s.name+' · '+p.name,ic:'🔧'});});
  });
  (DB.reminders||[]).forEach(r=>{if(r.date)dls.push({date:r.date,txt:r.txt||'',ic:'🔔'});});
  dls.sort((a,b)=>a.date<b.date?-1:(a.date>b.date?1:0));
  const soon=dls.slice(0,3);
  let h=`<div class="card" style="margin-bottom:12px">
    <div class="proj-meta" style="margin-bottom:2px">
      ${toReceive>0?`<span class="meta-pill">💶 К получению: <b>${money(toReceive)}</b></span>`:''}
      <span class="meta-pill">📦 <b>${aps.length}</b> в работе</span>
      ${buyN?`<span class="meta-pill" onclick="go('shop')" style="cursor:pointer">🛒 купить <b>${buyN}</b></span>`:''}
    </div>`;
  if(soon.length){
    h+=`<div class="fin-sub" style="margin:8px 0 2px">Ближайшие сроки</div>`;
    soon.forEach(d=>{const over=d.date<todayISO();h+=`<div style="display:flex;justify-content:space-between;gap:8px;font-size:13px;padding:3px 0"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${d.ic} ${esc(d.txt)}</span><span style="flex-shrink:0;${over?'color:var(--red)':'color:var(--muted)'}">${fmtDate(d.date)}${over?' · просроч.':''}</span></div>`;});
  }
  h+=`</div>`;
  return h;
}
function renderProjects(){
  if(showArchive){return renderArchive();}
  $('subtitle').textContent='мастерская · управление производством';
  $('content').innerHTML=`<input id="projSearch" class="proj-search" value="${esc(projQuery||'')}" oninput="projQuery=this.value;filterProjects()" placeholder="🔍 Поиск: проект, объект, клиент, телефон"><div id="projList"></div>`;
  filterProjects();
}
function filterProjects(){
  const box=$('projList');if(!box)return;
  const q=(projQuery||'').trim().toLowerCase();
  const objs=activeObjects();
  const hay=x=>[x.name,x.client,x.phone,x.address].filter(Boolean).join(' ').toLowerCase();
  let h='';
  if(q){
    const mObjs=objs.filter(o=>hay(o).includes(q));
    const mProjs=activeProjects().filter(p=>hay(p).includes(q)||(p.objectId&&objName(p.objectId).toLowerCase().includes(q)));
    if(!mObjs.length&&!mProjs.length){h=emptyState('M11 4a7 7 0 100 14 7 7 0 000-14zM21 21l-4.3-4.3','По запросу ничего не найдено.');}
    else{
      if(mObjs.length){h+=`<div class="sec-title">Объекты</div><div class="proj-grid">`;mObjs.forEach(o=>h+=objectCard(o));h+=`</div>`;}
      if(mProjs.length){h+=`<div class="sec-title">Проекты</div><div class="proj-grid">`;mProjs.forEach(p=>h+=projectCard(p));h+=`</div>`;}
    }
    box.innerHTML=h;return;
  }
  const loose=activeProjects().filter(p=>!p.objectId||!objs.some(o=>o.id===p.objectId));
  h=dashboardBlock();
  h+=`<div style="margin-bottom:12px"><button class="btn btn-ghost btn-sm" style="width:100%" onclick="sheetObject()">🏠 + Объект</button></div>`;
  if(!objs.length&&!loose.length){
    h+=emptyState('M3 7h18M3 12h18M3 17h18','Пока нет проектов.<br>Нажми «+», чтобы добавить проект, или «+ Объект» — квартиру с несколькими проектами.');
    box.innerHTML=h;return;
  }
  if(objs.length){h+=`<div class="proj-grid">`;objs.forEach(o=>h+=objectCard(o));h+=`</div>`;}
  if(loose.length){
    if(objs.length)h+=`<div class="sec-title">Отдельные проекты</div>`;
    h+=`<div class="proj-grid">`;loose.forEach(p=>h+=projectCard(p));h+=`</div>`;
  }
  box.innerHTML=h;
}
function projectCard(p){
  const stages=p.stages||[];
  const done=stages.filter(s=>s.done).length;
  const pct=stages.length?Math.round(done/stages.length*100):0;
  const badge=p.status==='done'?'<span class="badge b-done">Готов</span>':p.status==='hold'?'<span class="badge b-hold">Пауза</span>':'<span class="badge b-active">В работе</span>';
  const taskN=(p.tasks||[]).filter(t=>!t.done).length;
  const shopN=(p.shop||[]).filter(s=>!s.done).length;
  const f=fin(p);
  return `<div class="card proj-card" onclick="openProj('${p.id}')">
    <div class="proj-top"><div><div class="proj-name">${esc(p.name)}</div>
    ${(p.client||p.phone)?`<div class="proj-desc">${esc([p.client,p.phone].filter(Boolean).join(' · '))}</div>`:(p.desc?`<div class="proj-desc">${esc(p.desc)}</div>`:'')}
    ${(p.units&&p.units.length)?`<div class="proj-desc" style="color:var(--wood-2);margin-top:4px">📦 ${p.units.map(u=>esc(u.name)).join(', ')}</div>`:''}</div>${badge}</div>
    <div class="pbar"><i style="width:${pct}%"></i></div>
    <div class="pbar-label"><span>Этапы: ${done}/${stages.length}</span><span>${pct}%</span></div>
    <div class="proj-meta">
      ${p.price?`<span class="meta-pill">💶 <b>${money(f.income)}</b> из ${money(p.price)}</span>`:''}
      ${p.price&&f.remain>0?`<span class="meta-pill" style="color:var(--amber)">⏳ ост. <b>${money(f.remain)}</b></span>`:''}
      ${p.deadline?`<span class="meta-pill">📅 <b>${fmtDate(p.deadline)}</b></span>`:''}
      ${taskN?`<span class="meta-pill">✓ <b>${taskN}</b> задач</span>`:''}
      ${shopN?`<span class="meta-pill">🛒 <b>${shopN}</b> купить</span>`:''}
    </div></div>`;
}

/* ---------- ОБЪЕКТЫ (группировка проектов) ---------- */
function activeObjects(){return (DB.objects||[]).filter(o=>!o.archived);}
function objName(oid){const o=(DB.objects||[]).find(x=>x.id===oid);return o?o.name:'';}
function objProjects(oid){return DB.projects.filter(p=>p.objectId===oid&&!p.archived);}
function objFin(oid){
  const agg={income:0,price:0,spent:0,remain:0,profit:0,balance:0};
  objProjects(oid).forEach(p=>{const f=fin(p);agg.income+=f.income;agg.price+=f.price;agg.spent+=f.spent;agg.remain+=f.remain;agg.profit+=f.profit;agg.balance+=f.balance;});
  return agg;
}
function objDeadlines(oid){
  const out=[];
  objProjects(oid).forEach(p=>{
    if(p.deadline)out.push({date:p.deadline,txt:'🚩 Дедлайн · '+p.name});
    (p.stages||[]).forEach(s=>{if(s.date&&!s.done)out.push({date:s.date,txt:'🔧 '+s.name+' · '+p.name});});
  });
  out.sort((a,b)=>a.date<b.date?-1:(a.date>b.date?1:0));
  return out.slice(0,4);
}
function objectCard(o){
  const ps=objProjects(o.id),f=objFin(o.id),dl=objDeadlines(o.id),next=dl[0];
  return `<div class="card proj-card" onclick="openObjectView('${o.id}')" style="border-left:3px solid var(--wood)">
    <div class="proj-top"><div><div class="proj-name">🏠 ${esc(o.name)}</div>
    ${(o.client||o.phone||o.address)?`<div class="proj-desc">${esc([o.client,o.phone,o.address].filter(Boolean).join(' · '))}</div>`:''}</div>
    <span class="badge b-active">${ps.length} пр.</span></div>
    <div class="proj-meta">
      ${f.price?`<span class="meta-pill">💶 <b>${money(f.income)}</b> из ${money(f.price)}</span>`:''}
      ${f.remain>0?`<span class="meta-pill" style="color:var(--amber)">⏳ ост. <b>${money(f.remain)}</b></span>`:''}
      ${next?`<span class="meta-pill">📅 <b>${fmtDate(next.date)}</b></span>`:''}
    </div></div>`;
}

  if(ps.length){h+=`<div class="proj-grid">`;ps.forEach(p=>h+=projectCard(p));h+=`</div>`;}

  $('content').innerHTML=h;$('content').scrollTop=0;

function sheetObject(oid){
  const o=oid?(DB.objects||[]).find(x=>x.id===oid):null;
  openSheet(`<h2>${o?'Изменить объект':'Новый объект'}</h2>

      <div><label class="f">Заказчик</label><input id="oClient" value="${o?esc(o.client||''):''}" placeholder="Имя"></div>
      <div><label class="f">Телефон</label><input id="oPhone" type="tel" value="${o?esc(o.phone||''):''}" placeholder="+359…"></div>
    </div>
    <label class="f">Адрес (необязательно)</label>
    <input id="oAddr" value="${o?esc(o.address||''):''}" placeholder="Адрес объекта">
    <div class="sheet-actions"><button class="btn btn-ghost" onclick="closeSheet()">Отмена</button><button class="btn" onclick="saveObject('${oid||''}')">${o?'Сохранить':'Создать'}</button></div>`);

function saveObject(oid){
  const n=$('oName').value.trim();if(!n){$('oName').focus();return;}
  const data={name:n,client:$('oClient').value.trim(),phone:$('oPhone').value.trim(),address:$('oAddr').value.trim()};
  DB.objects=DB.objects||[];
  if(oid){const o=DB.objects.find(x=>x.id===oid);if(o)Object.assign(o,data);save();closeSheet();render();return;}
  const id=uid();DB.objects.unshift({id,...data,created:todayISO()});save();closeSheet();openObject=id;render();
}
function delObject(oid){
  const cnt=DB.projects.filter(p=>p.objectId===oid).length;
  if(!confirm(cnt?('Удалить объект? '+cnt+' проект(ов) внутри станут отдельными (не удалятся).'):'Удалить объект?'))return;
  DB.projects.forEach(p=>{if(p.objectId===oid)delete p.objectId;});
  DB.objects=(DB.objects||[]).filter(x=>x.id!==oid);
  if(openObject===oid)openObject=null;
  save();render();
}
function setProjObject(pid,oid){const p=DB.projects.find(x=>x.id===pid);if(oid)p.objectId=oid;else delete p.objectId;save();}

function openProj(id){openProject=id;projTab='stages';meFolder=null;render();}
function backFromProject(){const p=DB.projects.find(x=>x.id===openProject);openProject=null;openObject=(p&&p.objectId)?p.objectId:null;render();}

        ${(p.units&&p.units.length)?`<div class="proj-desc" style="color:var(--wood-2);margin-top:4px">📦 ${p.units.map(u=>esc(u.name)).join(', ')}</div>`:''}</div><span class="badge b-done">Завершён</span></div>
        <div class="pbar"><i style="width:${pct}%"></i></div>

function archiveProject(id){
  if(!confirm('Отправить проект в «Завершённые»?\nОн исчезнет из списка проектов, задач, закупок и календаря. Посмотреть его можно будет в архиве (иконка вверху).'))return;
  const p=DB.projects.find(x=>x.id===id);if(!p)return;
  p.archived=true;p.archivedAt=new Date().toISOString().slice(0,10);
  save();openProject=null;render();
}
function unarchiveProject(id){
  if(!confirm('Вернуть проект в работу?\nОн снова появится в списке проектов, задачах, закупках и календаре.'))return;
  const p=DB.projects.find(x=>x.id===id);if(!p)return;
  p.archived=false;delete p.archivedAt;
  save();openProject=null;showArchive=false;
  document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('active',b.dataset.tab==='projects'));
  render();
}

function stagesView(p){

  stages.forEach((s,i)=>{
    const dl=daysLeft(s.date);
    const over=dl!==null&&dl<0&&!s.done;
    h+=`<div class="stage">
      <div class="stage-rail">
        <div class="stage-dot ${s.done?'on':''}" onclick="toggleStage('${p.id}',${i})"></div>
        <div class="stage-line"></div>
      </div>
      <div class="stage-body">
        <div style="display:flex;justify-content:space-between;gap:8px">
          <span class="stage-name ${s.done?'done':''}">${esc(s.name)}</span>
          <button class="del" onclick="delStage('${p.id}',${i})">×</button>
        </div>
        <div class="stage-date ${over?'over':''}">📅 <input type="date" class="stage-date-input" value="${s.date||''}" onchange="setStageDate('${p.id}',${i},this.value)">${over?'<span class="over-tag">просрочен</span>':''}</div>

  });
  h+=`<div class="add-inline">

function listView(p,key,title,ph){
  const arr=p[key]||[];
  let h='';
  if(!arr.length)h=`<div class="empty"><p>Список пуст.</p></div>`;
  arr.forEach((it,i)=>{
    h+=`<div class="item">
      <div class="cbx ${it.done?'on':''}" onclick="toggleSub('${p.id}','${key}',${i})">${it.done?'<svg viewBox="0 0 24 24"><path d="M5 12l5 5L20 7"/></svg>':''}</div>
      <div class="item-body"><div class="item-txt ${it.done?'done':''}">${esc(it.txt)}</div></div>
      <button class="del" onclick="delSub('${p.id}','${key}',${i})">×</button>
    </div>`;
  });
  return `<div class="card">${h||''}<div class="add-inline">
    <input id="subAdd" placeholder="${ph}" onkeydown="if(event.key==='Enter')addSub('${p.id}','${key}')">
    <button onclick="addSub('${p.id}','${key}')">+</button></div></div>`;
}

function unitsCard(p){

    arr.forEach(u=>{h+=`<div class="item">

function saveExpense(id,kind,itemId){
  const p=DB.projects.find(x=>x.id===id);const t=$('exTxt').value.trim();const a=+$('exAmt').value;
  if(!t){$('exTxt').focus();return;}if(!a){$('exAmt').focus();return;}
  const key=kind==='main'?'mainExpenses':'expenses';p[key]=p[key]||[];
  const data={title:t,amount:a,cat:$('exCat').value.trim(),date:$('exDate').value||todayISO(),photo:pendingPhoto||'',clientPay:kind==='extra'?!!expClientPay:false};
  if(itemId){const it=p[key].find(x=>x.id===itemId);if(it){Object.assign(it,data);
    if(it.shopId){const s=(p.shop||[]).find(x=>x.id===it.shopId);if(s){s.txt=it.title;s.price=+it.amount||0;s.photo=it.photo||'';}}
  }}
  else p[key].push({id:uid(),...data});
  pendingPhoto=null;save();closeSheet();render();
}
function delExpense(pid,id,kind){
  const p=DB.projects.find(x=>x.id===pid);const key=kind==='main'?'mainExpenses':'expenses';
  const exp=(p[key]||[]).find(x=>x.id===id);
  if(exp&&exp.shopId){const s=(p.shop||[]).find(x=>x.id===exp.shopId);if(s){s.expensed=false;delete s.expId;delete s.expKind;}}
  p[key]=(p[key]||[]).filter(x=>x.id!==id);save();render();
}

  }}
  else p.shop.push({id:uid(),...data,done:false});

function toggleProjShop(pid,sid){
  const p=DB.projects.find(x=>x.id===pid);const s=p.shop.find(x=>x.id===sid);
  s.done=!s.done;
  if(!s.done&&s.expId){ // сняли «куплено» — убираем связанный расход
    const key=s.expKind==='main'?'mainExpenses':'expenses';
    p[key]=(p[key]||[]).filter(x=>x.id!==s.expId);
    delete s.expId;delete s.expKind;s.expensed=false;
  }
  save();render();
  if(s.done&&(+s.price)>0&&!s.expensed)shopToExpensePick(pid,sid);

function shopToExpense(pid,sid,kind){

/* ---------- CALENDAR ---------- */
function toISO(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function weekStartDate(d){const x=new Date(d);const wd=(x.getDay()+6)%7;x.setDate(x.getDate()-wd);x.setHours(0,0,0,0);return x;}
function calEvents(){
  const ev={};
  const push=(date,o)=>{if(!date)return;(ev[date]=ev[date]||[]).push(o);};
  DB.reminders.forEach(r=>push(r.date,{txt:r.txt,type:'rem',id:r.id}));
  activeProjects().forEach(p=>{
    if(p.deadline)push(p.deadline,{txt:'Дедлайн: '+p.name,type:'dead',pid:p.id});
    (p.stages||[]).filter(s=>s.date&&!s.done).forEach(s=>push(s.date,{txt:s.name+' · '+p.name,type:'stage',pid:p.id}));
  });
  return ev;
}
const ICON={rem:'🔔',dead:'🚩',stage:'🔧'};
function setCalMode(m){calMode=m;render();}
function calShift(dir){
  const d=new Date(calCursor+'T00:00');
  if(calMode==='month')d.setMonth(d.getMonth()+dir);
  else if(calMode==='week')d.setDate(d.getDate()+7*dir);
  else d.setDate(d.getDate()+dir);
  calCursor=toISO(d);render();
}
function calTitle(){
  const d=new Date(calCursor+'T00:00');
  if(calMode==='month')return d.toLocaleDateString('ru-RU',{month:'long',year:'numeric'});
  if(calMode==='week'){const a=weekStartDate(d);const b=new Date(a);b.setDate(b.getDate()+6);
    return a.toLocaleDateString('ru-RU',{day:'numeric',month:'short'})+' – '+b.toLocaleDateString('ru-RU',{day:'numeric',month:'short'});}
  return d.toLocaleDateString('ru-RU',{weekday:'long',day:'numeric',month:'long'});
}
function calCell(day,ev,curMonth){
  const iso=toISO(day);
  const evs=ev[iso]||[];
  const inMonth=curMonth==null?true:day.getMonth()===curMonth;
  let cls='cal-cell';
  if(!inMonth)cls+=' out';
  if(evs.some(e=>e.type==='dead'))cls+=' dead';
  if(iso===todayISO())cls+=' today';
  if(iso===calCursor)cls+=' sel';
  const dots=[...new Set(evs.map(e=>e.type))].map(t=>`<span class="dot ${t}"></span>`).join('');
  return `<div class="${cls}" onclick="calCursor='${iso}';render()"><span class="cal-num">${day.getDate()}</span><div class="cal-dots">${dots}</div></div>`;
}
function calMonth(ev){
  const cur=new Date(calCursor+'T00:00');
  const first=new Date(cur.getFullYear(),cur.getMonth(),1);
  const last=new Date(cur.getFullYear(),cur.getMonth()+1,0);
  let h=`<div class="cal-grid">`;
  ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'].forEach(d=>h+=`<div class="cal-wd">${d}</div>`);
  let day=weekStartDate(first);
  do{
    for(let i=0;i<7;i++){h+=calCell(day,ev,cur.getMonth());day.setDate(day.getDate()+1);}
  }while(day<=last);
  return h+`</div>`;
}
function calWeek(ev){
  let h=`<div class="cal-grid">`;
  ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'].forEach(d=>h+=`<div class="cal-wd">${d}</div>`);
  let day=weekStartDate(new Date(calCursor+'T00:00'));
  for(let i=0;i<7;i++){h+=calCell(day,ev,null);day.setDate(day.getDate()+1);}
  return h+`</div>`;
}
function calDayList(ev,iso,heading){
  const evs=(ev[iso]||[]);
  const d=new Date(iso+'T00:00');
  let h=heading?`<div class="sec-title">${d.toLocaleDateString('ru-RU',{weekday:'long',day:'numeric',month:'long'})}</div>`:'';
  h+=`<div class="card">`;
  if(!evs.length)h+=`<div style="color:var(--muted);font-size:13px;text-align:center;padding:6px">На этот день ничего нет</div>`;
  evs.forEach(e=>{
    if(e.pid){
      h+=`<div class="item" style="cursor:pointer" onclick="openProj('${e.pid}')">
        <div class="item-body"><div class="item-txt">${ICON[e.type]} ${esc(e.txt)}</div>
        <div class="item-sub">нажмите, чтобы открыть проект</div></div>
        <svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:var(--wood-2);fill:none;stroke-width:2;flex-shrink:0"><path d="M9 18l6-6-6-6"/></svg></div>`;
    }else{
      h+=`<div class="item"><div class="item-body"><div class="item-txt">${ICON[e.type]} ${esc(e.txt)}</div></div><button class="del" onclick="delRem('${e.id}')">×</button></div>`;
    }
  });
  return h+`</div>`;
}
function renderCalendar(){
  $('subtitle').textContent='календарь · сроки и напоминания';
  if(!calCursor)calCursor=todayISO();
  const ev=calEvents();
  const seg=(k,l)=>`<button class="${calMode===k?'on':''}" onclick="setCalMode('${k}')">${l}</button>`;
  let h=`<div class="tabs">${seg('month','Месяц')}${seg('week','Неделя')}${seg('day','День')}</div>
  <div class="cal-nav">
    <button onclick="calShift(-1)">‹</button>
    <div class="cal-title">${calTitle()}</div>
    <button onclick="calShift(1)">›</button>
  </div>`;
  if(calMode==='month')h+=calMonth(ev);
  else if(calMode==='week')h+=calWeek(ev);
  if(calMode!=='day'){
    h+=`<div class="cal-legend"><span><i class="dot dead"></i>дедлайн</span><span><i class="dot stage"></i>этап</span><span><i class="dot rem"></i>напоминание</span></div>`;
    h+=calDayList(ev,calCursor,true);
  }else{
    h+=calDayList(ev,calCursor,false);
  }
  h+=`<div class="row" style="margin-top:14px">
    <button class="btn btn-ghost btn-sm" onclick="calCursor=todayISO();render()">Сегодня</button>
    <button class="btn btn-sm" onclick="sheetReminder()">+ Напоминание</button>
  </div>`;
  $('content').innerHTML=h;
}

function addMeasureFolder(pid){
  const name=prompt('Название папки (напр. Кухня, Шкаф, Прихожая):','');
  if(name===null)return;const n=name.trim();if(!n)return;
  const p=DB.projects.find(x=>x.id===pid);p.measureFolders=p.measureFolders||[];

function openMeasuresFolder(pid,fid){meFolder=fid;render();}
function renameMeasureFolder(pid,fid){
  const p=DB.projects.find(x=>x.id===pid);const f=(p.measureFolders||[]).find(x=>x.id===fid);if(!f)return;
  const name=prompt('Название папки:',f.name);if(name===null)return;const n=name.trim();if(n){f.name=n;save();render();}
}
function delMeasureFolder(pid,fid){
  const p=DB.projects.find(x=>x.id===pid);const cnt=(p.measures||[]).filter(m=>m.folderId===fid).length;
  if(!confirm(cnt?('Удалить папку и '+cnt+' замер(ов) внутри?'):'Удалить папку?'))return;
  p.measures=(p.measures||[]).filter(m=>m.folderId!==fid);

  const p=DB.projects.find(x=>x.id===pid);p.measures=(p.measures||[]).filter(x=>x.id!==mid);save();render();
}
function addMeasure(pid){
  const inp=document.createElement('input');
  inp.type='file';inp.accept='image/*';inp.style.display='none';
  inp.onchange=()=>{pickPhoto(inp,d=>openMeasureEditor(pid,null,d,[],[]));setTimeout(()=>inp.remove(),100);};
  document.body.appendChild(inp);inp.click();
}
function openMeasure(pid,mid){
  const p=DB.projects.find(x=>x.id===pid);const m=(p.measures||[]).find(x=>x.id===mid);if(!m)return;
  openMeasureEditor(pid,mid,m.photo,m.ann||[],m.notes||[]);
}

let ME=null;
function openMeasureEditor(pid,mid,photo,ann,notes){
  ME={pid,mid,photo,ann:(ann||[]).map(a=>({...a})),notes:(notes||[]).map(n=>({...n})),noteMode:false,editingNote:null,draw:false,sel:null,drag:null,temp:null,img:null,cw:0,ch:0,_downXY:null,_downNote:null,ptrs:new Map(),gesture:null,scale:1,tx:0,ty:0};
  const ov=document.createElement('div');ov.className='me-overlay';ov.id='meOverlay';
  ov.innerHTML=`
    <div class="me-bar">
      <button class="me-btn" onclick="closeMeasureEditor()">Отмена</button>
      <div class="ttl">Замер — размеры на фото</div>
      <button class="me-btn primary" onclick="saveMeasure()">Готово ✓</button>
    </div>
    <div class="me-canvas-wrap" id="meWrap"><canvas id="meCanvas"></canvas></div>
    <div class="me-bar bottom">
      <button class="me-btn" id="meDrawBtn" onclick="meToggleDraw()">📏 Размер</button>
      <button class="me-btn" id="meNoteBtn" onclick="meToggleNote()">📝 Заметка</button>
      <button class="me-btn" id="meEditBtn" onclick="meEditSel()" disabled>✏️ Число</button>
      <button class="me-btn danger" id="meDelBtn" onclick="meDelSel()" disabled>🗑 Удалить</button>
      <div class="me-hint" id="meHint">«Добавить размер» → проведи пальцем по проёму. Двумя пальцами — приблизить/отдалить фото.</div>
    </div>`;
  document.body.appendChild(ov);
  const img=new Image();
  img.onload=()=>{ME.img=img;meLayout();meBind();meRedraw();};
  img.src=photo;
  window.addEventListener('resize',meOnResize);
}
function closeMeasureEditor(){window.removeEventListener('resize',meOnResize);const np=$('meNotePop');if(np)np.remove();const o=$('meOverlay');if(o)o.remove();ME=null;}
function meOnResize(){if(ME){meLayout();meRedraw();}}
function meLayout(){
  const wrap=$('meWrap'),cv=$('meCanvas');if(!wrap||!cv||!ME.img)return;
  const availW=wrap.clientWidth, availH=wrap.clientHeight;
  const iw=ME.img.width, ih=ME.img.height;
  let cw=availW, ch=cw*ih/iw;
  if(ch>availH){ch=availH;cw=ch*iw/ih;}
  ME.cw=cw;ME.ch=ch;ME.scale=1;ME.tx=0;ME.ty=0;
  const dpr=window.devicePixelRatio||1;
  cv.style.width=cw+'px';cv.style.height=ch+'px';
  cv.width=Math.round(cw*dpr);cv.height=Math.round(ch*dpr);
}
function meRedraw(){
  const cv=$('meCanvas');if(!cv||!ME.img)return;
  const ctx=cv.getContext('2d'),dpr=window.devicePixelRatio||1;
  ctx.setTransform(1,0,0,1,0,0);ctx.clearRect(0,0,cv.width,cv.height);
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.save();ctx.translate(ME.tx,ME.ty);ctx.scale(ME.scale,ME.scale);
  ctx.drawImage(ME.img,0,0,ME.cw,ME.ch);
  ctx.restore();
  ME.ann.forEach(a=>meDrawArrowScreen(ctx,a,a===ME.sel,false));
  if(ME.temp)meDrawArrowScreen(ctx,ME.temp,false,true);
  (ME.notes||[]).forEach(n=>meDrawNote(ctx,n));
}
function meArrowHead(ctx,tx,ty,ux,uy,len,col){
  const half=len*0.34,bx=tx-ux*len,by=ty-uy*len,px=-uy,py=ux;
  ctx.beginPath();ctx.moveTo(tx,ty);ctx.lineTo(bx+px*half,by+py*half);ctx.lineTo(bx-px*half,by-py*half);ctx.closePath();
  ctx.fillStyle=col;ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,.5)';ctx.lineWidth=1.2;ctx.lineJoin='round';ctx.stroke();
}
function meDrawArrowAt(ctx,x1,y1,x2,y2,label,col,k){
  const dx=x2-x1,dy=y2-y1,len=Math.hypot(dx,dy)||1,ux=dx/len,uy=dy/len;
  const head=16*k,back=Math.min(head*0.9,len/2);
  const lx1=x1+ux*back,ly1=y1+uy*back,lx2=x2-ux*back,ly2=y2-uy*back;
  ctx.lineCap='butt';
  ctx.strokeStyle='rgba(0,0,0,.5)';ctx.lineWidth=6*k;
  ctx.beginPath();ctx.moveTo(lx1,ly1);ctx.lineTo(lx2,ly2);ctx.stroke();
  ctx.strokeStyle=col;ctx.lineWidth=3*k;
  ctx.beginPath();ctx.moveTo(lx1,ly1);ctx.lineTo(lx2,ly2);ctx.stroke();
  meArrowHead(ctx,x2,y2,ux,uy,head,col);
  meArrowHead(ctx,x1,y1,-ux,-uy,head,col);
  if(label){
    let ang=Math.atan2(dy,dx);
    if(ang>Math.PI/2)ang-=Math.PI;else if(ang<-Math.PI/2)ang+=Math.PI;
    ctx.save();ctx.translate((x1+x2)/2,(y1+y2)/2);ctx.rotate(ang);
    ctx.font='800 '+(17*k)+'px Inter, sans-serif';ctx.fillStyle=col;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(label,0,-11*k);
    ctx.restore();
  }
}
function meDrawArrowScreen(ctx,a,selected,temp){
  const col=temp?'#ffd27f':(selected?'#7fffd4':'#ffe44d');
  const s1=meToScreen(a.x1,a.y1),s2=meToScreen(a.x2,a.y2);
  // размер привязан к фото: k=1 при масштабе, на котором рисовали; меньше при отдалении, больше при приближении
  const Wimg=ME.cw*ME.scale;
  const k=temp?1:((a.f||(1/ME.cw))*Wimg);
  meDrawArrowAt(ctx,s1.x,s1.y,s2.x,s2.y,a.label||'',col,k);
}
function meRoundPath(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function meDrawNoteAt(ctx,sx,sy,k){
  const r=13*k;
  ctx.save();
  meRoundPath(ctx,sx-r,sy-r,r*2,r*2,5*k);
  ctx.fillStyle='#7fd1ff';ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,.55)';ctx.lineWidth=2*k;ctx.stroke();
  ctx.strokeStyle='rgba(0,0,0,.6)';ctx.lineWidth=2*k;ctx.lineCap='round';
  for(let i=0;i<3;i++){const yy=sy-5*k+i*5*k;ctx.beginPath();ctx.moveTo(sx-7*k,yy);ctx.lineTo(sx+(i===2?1*k:7*k),yy);ctx.stroke();}
  ctx.restore();
}
function meDrawNote(ctx,n){const s=meToScreen(n.x,n.y);meDrawNoteAt(ctx,s.x,s.y,1);}
function meHitNote(px,py){for(let i=ME.notes.length-1;i>=0;i--){const n=ME.notes[i];const s=meToScreen(n.x,n.y);if(Math.hypot(px-s.x,py-s.y)<=20)return n;}return null;}
function meToggleNote(){meSetNoteMode(!ME.noteMode);}
function meSetNoteMode(on){
  ME.noteMode=on;const b=$('meNoteBtn');if(b)b.classList.toggle('active',on);
  if(on){meSetDraw(false);meSelect(null);}
  const hint=$('meHint');if(hint)hint.textContent=on?'Нажми на фото, где оставить заметку.':'Тапни по стрелке — выбрать, по 📝 — открыть заметку. Двумя пальцами — масштаб.';
}
function openNotePopup(note){
  ME.editingNote=note;
  const ex=$('meNotePop');if(ex)ex.remove();
  const pop=document.createElement('div');pop.className='me-note-pop';pop.id='meNotePop';
  pop.innerHTML=`<div style="font-weight:700;margin-bottom:8px">📝 Заметка к фото</div>
    <textarea id="meNoteText" placeholder="Напишите заметку…">${esc(note.text||'')}</textarea>
    <div class="row"><button class="me-btn danger" onclick="delNotePopup()">Удалить</button><button class="me-btn primary" style="flex:1" onclick="closeNotePopup()">Готово</button></div>`;
  document.body.appendChild(pop);
  setTimeout(()=>{const t=$('meNoteText');if(t)t.focus();},60);
}
function closeNotePopup(){
  const pop=$('meNotePop');
  if(ME&&ME.editingNote){
    const t=$('meNoteText');ME.editingNote.text=t?t.value.trim():'';
    if(!ME.editingNote.text)ME.notes=ME.notes.filter(n=>n!==ME.editingNote);
  }
  if(pop)pop.remove();if(ME)ME.editingNote=null;meRedraw();
}
function delNotePopup(){
  if(ME&&ME.editingNote)ME.notes=ME.notes.filter(n=>n!==ME.editingNote);
  const pop=$('meNotePop');if(pop)pop.remove();if(ME)ME.editingNote=null;meRedraw();
}
function meBind(){
  const cv=$('meCanvas');if(!cv)return;
  cv.onpointerdown=mePointerDown;cv.onpointermove=mePointerMove;cv.onpointerup=mePointerUp;cv.onpointercancel=mePointerUp;
}
function meXY(e){const r=$('meCanvas').getBoundingClientRect();return {x:e.clientX-r.left,y:e.clientY-r.top};}
function clamp01(v){return Math.max(0,Math.min(1,v));}
function meToNorm(px,py){return {nx:(px-ME.tx)/(ME.cw*ME.scale),ny:(py-ME.ty)/(ME.ch*ME.scale)};}
function meToScreen(nx,ny){return {x:ME.tx+nx*ME.cw*ME.scale,y:ME.ty+ny*ME.ch*ME.scale};}
function meClampView(){
  const W=ME.cw*ME.scale,H=ME.ch*ME.scale;
  ME.tx=Math.min(0,Math.max(ME.cw-W,ME.tx));
  ME.ty=Math.min(0,Math.max(ME.ch-H,ME.ty));
}
function meHitEndpoint(px,py){
  for(let i=ME.ann.length-1;i>=0;i--){const a=ME.ann[i];
    for(const k of [['x1','y1'],['x2','y2']]){const s=meToScreen(a[k[0]],a[k[1]]);if(Math.hypot(px-s.x,py-s.y)<=24)return {a,kx:k[0],ky:k[1]};}
  }
  return null;
}
function meDistToSeg(px,py,x1,y1,x2,y2){
  const dx=x2-x1,dy=y2-y1,l2=dx*dx+dy*dy||1;
  let t=((px-x1)*dx+(py-y1)*dy)/l2;t=Math.max(0,Math.min(1,t));
  return Math.hypot(px-(x1+t*dx),py-(y1+t*dy));
}
function meHitLine(px,py){
  for(let i=ME.ann.length-1;i>=0;i--){const a=ME.ann[i];const s1=meToScreen(a.x1,a.y1),s2=meToScreen(a.x2,a.y2);
    if(meDistToSeg(px,py,s1.x,s1.y,s2.x,s2.y)<=18)return a;
  }
  return null;
}
function mePointerDown(e){
  e.preventDefault();const cv=$('meCanvas');if(cv.setPointerCapture)try{cv.setPointerCapture(e.pointerId);}catch(_){}
  const pt=meXY(e);ME.ptrs.set(e.pointerId,pt);
  if(ME.ptrs.size===2){ // два пальца — жест зум/панорама
    ME.temp=null;ME.drag=null;
    const p=[...ME.ptrs.values()];
    ME.gesture={d0:Math.hypot(p[0].x-p[1].x,p[0].y-p[1].y)||1,mid0:{x:(p[0].x+p[1].x)/2,y:(p[0].y+p[1].y)/2},scale0:ME.scale,tx0:ME.tx,ty0:ME.ty};
    return;
  }
  if(ME.ptrs.size>2)return;
  ME._downXY=pt;ME._downNote=null;
  if(ME.noteMode)return; // заметка ставится по отпусканию (тап)
  if(ME.draw){const n=meToNorm(pt.x,pt.y);ME.temp={x1:n.nx,y1:n.ny,x2:n.nx,y2:n.ny};return;}
  const nh=meHitNote(pt.x,pt.y);
  if(nh){ME._downNote=nh;return;}
  const ep=meHitEndpoint(pt.x,pt.y);
  if(ep){ME.drag={ep};meSelect(ep.a);return;}
  const ln=meHitLine(pt.x,pt.y);
  if(ln){meSelect(ln);const n=meToNorm(pt.x,pt.y);ME.drag={move:ln,ox:n.nx,oy:n.ny,sx1:ln.x1,sy1:ln.y1,sx2:ln.x2,sy2:ln.y2};return;}
  meSelect(null);
}
function mePointerMove(e){
  if(!ME||!ME.ptrs.has(e.pointerId))return;
  const pt=meXY(e);ME.ptrs.set(e.pointerId,pt);
  if(ME.gesture&&ME.ptrs.size>=2){
    const p=[...ME.ptrs.values()],g=ME.gesture;
    const d=Math.hypot(p[0].x-p[1].x,p[0].y-p[1].y)||1,mid={x:(p[0].x+p[1].x)/2,y:(p[0].y+p[1].y)/2};
    const sc=Math.max(1,Math.min(8,g.scale0*(d/g.d0)));
    const imgX=(g.mid0.x-g.tx0)/g.scale0,imgY=(g.mid0.y-g.ty0)/g.scale0;
    ME.scale=sc;ME.tx=mid.x-imgX*sc;ME.ty=mid.y-imgY*sc;
    meClampView();meRedraw();return;
  }
  if(ME.ptrs.size>1)return;
  if(ME.draw&&ME.temp){const n=meToNorm(pt.x,pt.y);ME.temp.x2=n.nx;ME.temp.y2=n.ny;meRedraw();return;}
  if(ME.drag&&ME.drag.ep){const a=ME.drag.ep.a,n=meToNorm(pt.x,pt.y);a[ME.drag.ep.kx]=clamp01(n.nx);a[ME.drag.ep.ky]=clamp01(n.ny);meRedraw();return;}
  if(ME.drag&&ME.drag.move){const a=ME.drag.move,n=meToNorm(pt.x,pt.y),dx=n.nx-ME.drag.ox,dy=n.ny-ME.drag.oy;
    a.x1=clamp01(ME.drag.sx1+dx);a.y1=clamp01(ME.drag.sy1+dy);a.x2=clamp01(ME.drag.sx2+dx);a.y2=clamp01(ME.drag.sy2+dy);meRedraw();return;}
}
function mePointerUp(e){
  if(!ME)return;
  ME.ptrs.delete(e.pointerId);
  if(ME.gesture){if(ME.ptrs.size<2)ME.gesture=null;ME._downXY=null;ME.drag=null;ME.temp=null;ME._downNote=null;return;}
  const up=meXY(e);
  const moved=ME._downXY?Math.hypot(up.x-ME._downXY.x,up.y-ME._downXY.y)>8:false;
  if(ME.noteMode){
    if(!moved&&ME._downXY){const n=meToNorm(ME._downXY.x,ME._downXY.y);const note={id:uid(),x:clamp01(n.nx),y:clamp01(n.ny),text:''};ME.notes.push(note);meSetNoteMode(false);meRedraw();openNotePopup(note);}
    ME._downXY=null;return;
  }
  if(ME._downNote){const nt=ME._downNote;ME._downNote=null;ME._downXY=null;if(!moved){openNotePopup(nt);}return;}
  if(ME.draw&&ME.temp){
    const t=ME.temp;ME.temp=null;
    const s1=meToScreen(t.x1,t.y1),s2=meToScreen(t.x2,t.y2);
    if(Math.hypot(s2.x-s1.x,s2.y-s1.y)>20){
      const lbl=prompt('Размер (например 1840 мм):','');
      const a={id:uid(),x1:t.x1,y1:t.y1,x2:t.x2,y2:t.y2,label:(lbl||'').trim(),f:1/(ME.cw*ME.scale)};
      ME.ann.push(a);meSelect(a);
    }
    meSetDraw(false);meRedraw();return;
  }
  ME.drag=null;ME._downXY=null;
}
function meSelect(a){ME.sel=a||null;const e=$('meEditBtn'),d=$('meDelBtn');if(e)e.disabled=!ME.sel;if(d)d.disabled=!ME.sel;meRedraw();}
function meToggleDraw(){meSetDraw(!ME.draw);}
function meSetDraw(on){
  ME.draw=on;const b=$('meDrawBtn');if(b)b.classList.toggle('active',on);
  if(on){ME.noteMode=false;const nb=$('meNoteBtn');if(nb)nb.classList.remove('active');meSelect(null);}
  const hint=$('meHint');if(hint)hint.textContent=on?'Проведи пальцем по проёму, потом впиши размер. Двумя пальцами — масштаб фото.':'Тапни по стрелке — выбрать, по 📝 — открыть заметку. Двумя пальцами — масштаб.';
}
function meEditSel(){if(!ME.sel)return;const lbl=prompt('Размер:',ME.sel.label||'');if(lbl!==null){ME.sel.label=lbl.trim();meRedraw();}}
function meDelSel(){if(!ME.sel)return;ME.ann=ME.ann.filter(a=>a!==ME.sel);meSelect(null);}
function meMakePreview(photo,ann,notes,maxW,editorW){
  return new Promise(res=>{
    const img=new Image();
    img.onload=()=>{
      let w=img.width,h=img.height;if(w>maxW){h=Math.round(h*maxW/w);w=maxW;}
      const c=document.createElement('canvas');c.width=w;c.height=h;
      const ctx=c.getContext('2d');ctx.drawImage(img,0,0,w,h);
      ann.forEach(a=>{const k=a.f?a.f*w:(editorW?w/editorW:1);meDrawArrowAt(ctx,a.x1*w,a.y1*h,a.x2*w,a.y2*h,a.label||'','#ffe44d',k);});
      const nk=editorW?(w/editorW):1;
      (notes||[]).forEach(n=>meDrawNoteAt(ctx,n.x*w,n.y*h,nk));
      res(c.toDataURL('image/jpeg',0.8));
    };
    img.onerror=()=>res(photo);
    img.src=photo;
  });
}
function saveMeasure(){
  if(!ME)return;
  const p=DB.projects.find(x=>x.id===ME.pid);if(!p){closeMeasureEditor();return;}
  p.measures=p.measures||[];
  const photo=ME.photo,ann=ME.ann,notes=ME.notes,mid=ME.mid,editorW=ME.cw;
  meMakePreview(photo,ann,notes,600,editorW).then(preview=>{
    if(mid){const m=p.measures.find(x=>x.id===mid);if(m){m.ann=ann;m.notes=notes;m.preview=preview;}}
    else p.measures.push({id:uid(),photo,ann,notes,preview,created:todayISO(),folderId:meFolder||null});
    save();closeMeasureEditor();render();
  });
}

      <div class="chips" style="align-items:center;gap:10px">
        ${accents.map(c=>`<button type="button" onclick="setAccent('${c}')" style="width:30px;height:30px;border-radius:50%;border:2px solid ${themeAccent().toLowerCase()===c?'var(--text)':'transparent'};background:${c};cursor:pointer"></button>`).join('')}
        <input type="color" value="${themeAccent()}" onchange="setAccent(this.value)" style="width:36px;height:32px;padding:0;border:none;background:none;cursor:pointer">
      </div>
    </div>

    <div class="sec-title">Валюта</div>
    <div class="card"><div class="chips">${curs.map(c=>`<button type="button" class="chip ${curSym()===c?'on':''}" onclick="setCurrency('${c}')">${c}</button>`).join('')}</div></div>

    <div class="sec-title">Поставщики</div>
    <div class="card">`;
  supList().forEach((sup,i)=>{h+=`<div class="money-row"><div style="flex:1;cursor:pointer" onclick="renameSupplier(${i})"><div class="item-txt">${esc(sup)}</div></div><button class="del" onclick="delSupplier(${i})">×</button></div>`;});
  h+=`</div><button class="btn btn-ghost btn-sm" style="width:100%" onclick="addSupplier()">+ Добавить поставщика</button>

    <div class="sec-title">Уведомления</div>
    <div class="card">
      <label class="f">Время утреннего напоминания</label>
      <select onchange="setNotifyHour(this.value)">${Array.from({length:17},(_,k)=>k+6).map(hh=>`<option value="${hh}" ${notifyHour()===hh?'selected':''}>${String(hh).padStart(2,'0')}:00</option>`).join('')}</select>
      <div class="fin-sub" style="margin-top:8px">Одно уведомление в день о сроках на сегодня и завтра. Новое время применится после синхронизации.</div>
    </div>

    <div class="sec-title">Резервная копия</div>
    <div class="card">
      <button class="btn btn-ghost btn-sm" style="width:100%" onclick="exportData()">⬇️ Сохранить копию в файл</button>
      <button class="btn btn-ghost btn-sm" style="width:100%;margin-top:8px" onclick="document.getElementById('importFile').click()">⬆️ Загрузить копию из файла</button>
      <div class="fin-sub" style="margin-top:8px">Выгрузка/загрузка всех данных в файл. Облачная синхронизация работает отдельно.</div>
    </div>
    <div style="height:30px"></div>`;
  $('content').innerHTML=h;$('content').scrollTop=0;
}
function setWs(f,v){const s=stg();s.workshop=s.workshop||{};s.workshop[f]=(typeof v==='string')?v.trim():v;save();applySettings();}
function onLogoPick(input){pickPhoto(input,d=>{setWs('logo',d);renderSettings();});}
function setTheme(m){const s=stg();s.theme=s.theme||{};s.theme.mode=m;save();applySettings();renderSettings();}
function setAccent(c){const s=stg();s.theme=s.theme||{};s.theme.accent=c;save();applySettings();renderSettings();}
function setCurrency(c){stg().currency=c;save();renderSettings();}
function setNotifyHour(h){stg().notifyHour=+h;save();}
function addSupplier(){const n=prompt('Название поставщика:','');if(n&&n.trim()){const s=stg();s.suppliers=supList().slice();s.suppliers.push(n.trim());save();renderSettings();}}
function renameSupplier(i){const list=supList();const n=prompt('Название поставщика:',list[i]);if(n===null)return;const s=stg();s.suppliers=list.slice();if(n.trim())s.suppliers[i]=n.trim();save();renderSettings();}
function delSupplier(i){const s=stg();s.suppliers=supList().slice();s.suppliers.splice(i,1);save();renderSettings();}

/* ---------- FAB / sheets ---------- */
function onFab(){
  if(openProject){
    if(projTab==='money')sheetExpensePick(openProject);
    else if(projTab==='shop')sheetProjShop(openProject);
    else if(projTab==='measures')addMeasure(openProject);
    else if(projTab==='tasks'){const e=$('subAdd');if(e)e.focus();}
    else if(projTab==='stages'){const e=$('stName');if(e)e.focus();}
    return;
  }
  if(openObject){sheetProject(openObject);return;}
  if(TAB==='projects')sheetProject();
  else if(TAB==='tasks')sheetTask();
  else if(TAB==='shop')sheetShop();
  else if(TAB==='calendar')sheetReminder();
}
function openSheet(html){$('sheet').innerHTML=html;$('overlay').classList.add('show');}
function closeSheet(){$('overlay').classList.remove('show');}

function sheetProject(objId){
  objId=objId||'';
  const objs=activeObjects();
  const inObj=objId?(objs.find(o=>o.id===objId)||null):null;
  const clientFields=objId?`<div class="fin-sub" style="margin:2px 0 8px">Заказчик и телефон — из объекта «${inObj?esc(inObj.name):''}».</div>`:`<div class="row">
      <div><label class="f">Заказчик</label><input id="pClient" placeholder="Имя"></div>
      <div><label class="f">Телефон</label><input id="pPhone" type="tel" placeholder="+359…"></div>
    </div>`;
  const objSel=(!objId&&objs.length)?`<label class="f">Объект (необязательно)</label>
    <select id="pObj"><option value="">— Без объекта —</option>${objs.map(o=>`<option value="${o.id}">${esc(o.name)}</option>`).join('')}</select>`:'';
  openSheet(`<h2>Новый проект${objId?' в объекте':''}</h2>
    <label class="f">Название</label>
    <input id="pName" placeholder="Напр. Кухня угловая" autofocus>
    ${clientFields}
    ${objSel}
    <label class="f">Дедлайн (необязательно)</label>
    <input type="date" id="pDead">
    <div class="sheet-actions">
      <button class="btn btn-ghost" onclick="closeSheet()">Отмена</button>
      <button class="btn" onclick="saveProject('${objId}')">Создать</button>
    </div>`);
  setTimeout(()=>$('pName').focus(),100);
}
function saveProject(objId){
  const n=$('pName').value.trim();if(!n){$('pName').focus();return;}
  const oid=objId||($('pObj')?$('pObj').value:'')||'';
  const proj={id:uid(),name:n,client:$('pClient')?$('pClient').value.trim():'',phone:$('pPhone')?$('pPhone').value.trim():'',
    created:todayISO(),deadline:$('pDead').value,price:0,prepay:0,finalpay:0,desc:'',
    status:'active',units:[],stages:makeStages(),tasks:[],shop:[],mainExpenses:[],expenses:[]};
  if(oid)proj.objectId=oid;
  DB.projects.unshift(proj);
  save();closeSheet();render();
}

function sheetTask(){
  openSheet(`<h2>Новая задача</h2>
    <label class="f">Что нужно сделать</label>
    <input id="tTxt" placeholder="Напр. Позвонить поставщику ЛДСП">
    <label class="f">Заметка (необязательно)</label>
    <input id="tNote" placeholder="детали…">
    <div class="sheet-actions">
      <button class="btn btn-ghost" onclick="closeSheet()">Отмена</button>
      <button class="btn" onclick="saveTask()">Добавить</button>
    </div>`);
  setTimeout(()=>$('tTxt').focus(),100);
}
function saveTask(){const t=$('tTxt').value.trim();if(!t)return;DB.tasks.unshift({id:uid(),txt:t,note:$('tNote').value.trim(),done:false});save();closeSheet();render();}

function sheetShop(mode,a,b){
  // mode: '' (новая) | 'p' (правка позиции проекта, a=pid b=sid) | 'm' (правка свободной, a=id)
  mode=mode||'';
  let it=null,curPid='';
  if(mode==='p'){const p=DB.projects.find(x=>x.id===a);it=p&&(p.shop||[]).find(x=>x.id===b);curPid=a;}
  else if(mode==='m'){it=DB.shop.find(x=>x.id===a);}
  pendingPhoto=it?(it.photo||null):null;
  const projOpts=`<option value="">— Свободный список (без проекта) —</option>`+
    activeProjects().map(p=>`<option value="${p.id}" ${curPid===p.id?'selected':''}>${esc(p.name)}</option>`).join('');
  openSheet(`<h2>${it?'Изменить покупку':'Добавить в закупки'}</h2>
    <label class="f">Что купить</label><input id="gsTxt" placeholder="Напр. Петли Blum" value="${it?esc(it.txt):''}">
    <div class="row">
      <div><label class="f">Кол-во</label><input id="gsQty" placeholder="20 шт" value="${it?esc(it.qty||''):''}"></div>
      <div><label class="f">Цена (${curSym()})</label><input id="gsPrice" type="number" inputmode="decimal" placeholder="0" value="${it?(it.price||''):''}"></div>
    </div>
    <label class="f">К какому проекту</label>
    <select id="gsProj">${projOpts}</select>
    <label class="f">Поставщик</label>
    <div class="chips" id="gsSupChips">${supList().map(s=>`<button type="button" class="chip ${it&&it.supplier===s?'on':''}" onclick="pickSupG(this,'${s}')">${s}</button>`).join('')}</div>
    <input id="gsSup" placeholder="или впишите своего…" value="${it?esc(it.supplier||''):''}" style="margin-top:8px">
    <label class="f">Доп. информация (необязательно)</label>
    <textarea id="gsNote" rows="2" placeholder="Напр. артикул, цвет, размер, кому звонить…">${it?esc(it.note||''):''}</textarea>
    <label class="f">Фото (необязательно)</label>
    <input type="file" accept="image/*" id="gsPhoto" style="display:none" onchange="onSheetPhoto(this)">
    <button type="button" class="btn btn-ghost btn-sm" style="width:100%" onclick="$('gsPhoto').click()">📷 Снять фото / выбрать</button>
    <div id="photoPreview"></div>
    <div class="sheet-actions"><button class="btn btn-ghost" onclick="closeSheet()">Отмена</button><button class="btn" onclick="saveShopGlobal('${mode}','${a||''}','${b||''}')">Сохранить</button></div>`);
  setTimeout(()=>{renderSheetPhoto();$('gsTxt').focus();},100);
}
function pickSupG(btn,name){document.querySelectorAll('#gsSupChips .chip').forEach(c=>c.classList.remove('on'));btn.classList.add('on');$('gsSup').value=name;}
function saveShopGlobal(mode,a,b){
  const t=$('gsTxt').value.trim();if(!t){$('gsTxt').focus();return;}
  const data={txt:t,qty:$('gsQty').value.trim(),price:+$('gsPrice').value||0,supplier:$('gsSup').value.trim(),note:$('gsNote').value.trim(),photo:pendingPhoto||''};
  const newPid=$('gsProj').value;
  // забираем старую позицию (чтобы сохранить id и статус «куплено») и удаляем со старого места
  let old=null;
  if(mode==='p'){const p=DB.projects.find(x=>x.id===a);if(p){old=(p.shop||[]).find(x=>x.id===b);p.shop=(p.shop||[]).filter(x=>x.id!==b);}}
  else if(mode==='m'){old=DB.shop.find(x=>x.id===a);DB.shop=DB.shop.filter(x=>x.id!==a);}
  const item={id:old?old.id:uid(),...data,done:old?!!old.done:false};
  if(newPid){const p=DB.projects.find(x=>x.id===newPid);if(p){p.shop=p.shop||[];p.shop.push(item);}}
  else DB.shop.unshift(item);
  pendingPhoto=null;save();closeSheet();render();
}

function sheetReminder(){
  const today=(TAB==='calendar'&&calCursor)?calCursor:new Date().toISOString().slice(0,10);
  openSheet(`<h2>Новое напоминание</h2>
    <label class="f">О чём напомнить</label>
    <input id="rTxt" placeholder="Напр. Замер у клиента">
    <label class="f">Дата</label>
    <input type="date" id="rDate" value="${today}">
    <div class="sheet-actions">
      <button class="btn btn-ghost" onclick="closeSheet()">Отмена</button>
      <button class="btn" onclick="saveRem()">Добавить</button>
    </div>`);
  setTimeout(()=>$('rTxt').focus(),100);
}
function saveRem(){const t=$('rTxt').value.trim();if(!t)return;DB.reminders.push({id:uid(),txt:t,date:$('rDate').value});save();closeSheet();render();}

/* ---------- backup: export / import ---------- */
function exportData(){
  const data=JSON.stringify(DB,null,2);
  const blob=new Blob([data],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const d=new Date();
  const stamp=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  const a=document.createElement('a');
  a.href=url;a.download='verstak-копия-'+stamp+'.json';
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}
function importData(ev){
  const file=ev.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const d=JSON.parse(e.target.result);
      if(!d||typeof d!=='object'||!('projects'in d))throw 0;
      if(!confirm('Загрузить данные из копии? Текущие данные будут заменены.'))return;
      DB={projects:d.projects||[],tasks:d.tasks||[],shop:d.shop||[],reminders:d.reminders||[]};
      save();openProject=null;render();
      alert('Готово! Данные загружены.');
    }catch(err){alert('Не получилось прочитать файл. Выбери файл копии «verstak-…json».');}
    ev.target.value='';
  };
  r.readAsText(file);
}

/* init — асинхронная загрузка из IndexedDB, затем первый render и сервис-воркер */
init();
initSync();
</script>
